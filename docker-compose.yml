# Docker Compose file for rec-brain
# Run with: docker compose up --build

services:

  # rec-brain — FastAPI AI orchestration service
  rec-brain:
    build:
      context: .                                   # current directory contains the Dockerfile
    image: rec-brain
    container_name: rec-brain                      # fixed name so .NET backend can call http://rec-brain:8000
    env_file:
      - .env.docker                                # load environment variables for Docker (uses host.docker.internal)
    volumes:
      - .:/app                                     # mount local code so changes reflect without rebuilding
    ports:
      - "8000:8000"                                # expose API to host for direct testing (Postman, curl)
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload  # --reload restarts on code changes
