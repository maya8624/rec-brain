name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

jobs:
  build-base:
    name: Build base image (only when requirements.base.txt changes)
    runs-on: ubuntu-latest
    outputs:
      base_changed: ${{ steps.filter.outputs.base }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if requirements.base.txt changed
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            base:
              - 'requirements.base.txt'
              - 'Dockerfile.base'

      - name: Log in to ACR
        if: steps.filter.outputs.base == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push base image
        if: steps.filter.outputs.base == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/rec-brain-base:latest

  deploy:
    name: Build app image and deploy
    runs-on: ubuntu-latest
    needs: build-base
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/rec-brain:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/rec-brain-base:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ secrets.CONTAINER_APP_NAME }}
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/rec-brain:${{ github.sha }}
